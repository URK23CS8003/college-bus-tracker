apiVersion: apps/v1
kind: Deployment
metadata:
  name: bus-tracker
  namespace: bus-tracker
  labels:
    app: bus-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bus-tracker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bus-tracker
    spec:
      containers:
        - name: bus-tracker
          image: DOCKER_USERNAME/college-bus-tracker:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
      restartPolicy: Always
