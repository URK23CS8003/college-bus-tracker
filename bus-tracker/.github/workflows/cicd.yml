name: College Bus Tracker - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: college-bus-tracker
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Build & Test
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('app/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd app
          pytest test_app.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/

  # ─────────────────────────────────────────
  # Stage 2: Docker Build & Push
  # ─────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_HUB_USERNAME/$IMAGE_NAME:${{ steps.vars.outputs.TAG }} \
                       -t $DOCKER_HUB_USERNAME/$IMAGE_NAME:latest \
                       ./app

      - name: Push Docker image
        run: |
          docker push $DOCKER_HUB_USERNAME/$IMAGE_NAME:${{ steps.vars.outputs.TAG }}
          docker push $DOCKER_HUB_USERNAME/$IMAGE_NAME:latest

      - name: Save image tag
        run: echo "${{ steps.vars.outputs.TAG }}" > image-tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt

  # ─────────────────────────────────────────
  # Stage 3: Deploy to Kubernetes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image tag
        uses: actions/download-artifact@v4
        with:
          name: image-tag

      - name: Set image tag
        id: vars
        run: echo "TAG=$(cat image-tag.txt)" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Update image in deployment
        run: |
          sed -i "s|IMAGE_TAG|${{ steps.vars.outputs.TAG }}|g" k8s/deployment.yaml
          sed -i "s|DOCKER_USERNAME|${{ secrets.DOCKER_HUB_USERNAME }}|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/bus-tracker -n bus-tracker --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n bus-tracker
          kubectl get svc -n bus-tracker
